<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Y.E.S.I CONCEPT | La fin n'est pas une fin.</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #B8952A;
      --gold-light: #D4AF55;
      --black: #0A0A0A;
      --grey: #7A7A7A;
      --white: #FFFFFF;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--white);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
    }

    /* ── SCÈNE PRINCIPALE ── */
    .scene {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      position: relative;
    }

    /* ── LOGO ── */
    .logo-img {
      height: 48px;
      object-fit: contain;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.3s;
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ── LIGNE HAUTE ── */
    .line-top {
      width: 0;
      height: 1px;
      background: var(--gold);
      animation: expandLine 1s cubic-bezier(0.77,0,0.18,1) forwards 1s;
      margin-bottom: 52px;
    }

    /* ── TITRE PRINCIPAL ── */
    .main-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 11vw, 7.5rem);
      letter-spacing: 0.03em;
      line-height: 0.92;
      text-align: center;
      color: var(--black);
      opacity: 0;
      transform: translateY(32px);
      animation: riseUp 1s cubic-bezier(0.22,1,0.36,1) forwards 1.6s;
    }

    .main-title em {
      font-style: normal;
      color: var(--gold);
    }

    /* ── SOUS-TITRE ── */
    .sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      font-style: italic;
      font-weight: 300;
      color: var(--grey);
      text-align: center;
      max-width: 520px;
      line-height: 1.75;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 2.8s;
      margin-top: 28px;
    }

    /* ── LIGNE BASSE ── */
    .line-bottom {
      width: 0;
      height: 1px;
      background: var(--gold);
      animation: expandLine 1s cubic-bezier(0.77,0,0.18,1) forwards 3.6s;
      margin-top: 52px;
      margin-bottom: 44px;
    }

    /* ── BOUTONS ── */
    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 4.2s;
    }

    .btn-gold {
      display: inline-block;
      background: var(--gold);
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.22em;
      text-decoration: none;
      padding: 16px 44px;
      border-radius: 2px;
      transition: background 0.3s, transform 0.2s;
    }

    .btn-gold:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }

    .btn-ghost {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--grey);
      text-decoration: none;
      border-bottom: 1px solid var(--grey-light, #ccc);
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
    }

    .btn-ghost:hover {
      color: var(--gold);
      border-color: var(--gold);
    }



    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes riseUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes expandLine {
      to { width: min(280px, 60vw); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .scene { padding: 32px 24px; }
      .logo { font-size: 0.8rem; top: 28px; }
      .sub { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="scene">

    <img src="https://yesi-concept.github.io/PARLONS-PEU-PARLONS-BIEN/logo.png" alt="Y.E.S.I CONCEPT" class="logo-img" crossorigin="anonymous" />

    <div class="line-top"></div>

    <h1 class="main-title">
      La fin<br>n'est pas<br>une <em>fin.</em>
    </h1>

    <p class="sub">
      Ce que tu as appris ici, tes athlètes vont le ressentir
      avant même que tu ouvres la bouche.
    </p>

    <div class="line-bottom"></div>

    <div class="actions">
      <a href="10.CERTIFICAT.html" class="btn-gold">OBTENIR MON CERTIFICAT</a>
      <a href="11.ET-MAINTENANT.html" class="btn-ghost">Continuer → Et maintenant ?</a>
    </div>



  </div>

</body>
</html>
